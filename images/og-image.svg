  <rect x="264" y="440" width="130" height="34" rx="17" fill="#9B8EC4" opacity="0.2"/>
  <text x="329" y="462" font-family="Arial, sans-serif" font-size="13" fill="#C8BFDF" text-anchor="middle" letter-spacing="0.5">Founders</text>
  <rect x="410" y="440" width="180" height="34" rx="17" fill="#9B8EC4" opacity="0.2"/>
  <text x="500" y="462" font-family="Arial, sans-serif" font-size="13" fill="#C8BFDF" text-anchor="middle" letter-spacing="0.5">Real Estate Pros</text>
  <!-- Right decorative element -->
  <rect x="820" y="160" width="300" height="310" rx="24" fill="#9B8EC4" opacity="0.06" stroke="#9B8EC4" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="970" y="270" font-family="Georgia, serif" font-size="52" fill="#9B8EC4" opacity="0.5" text-anchor="middle">20+</text>
  <text x="970" y="304" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">HRS/WEEK GIVEN BACK</text>
