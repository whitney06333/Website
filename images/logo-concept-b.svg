<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Concept B: Circle Seal / Badge — classic professional mark -->
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#9B8EC4" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#C8BFDF" stroke-width="0.75" opacity="0.5"/>
  <!-- WI monogram -->
  <text x="100" y="122" font-family="Georgia,serif" font-size="64" font-style="italic" fill="#5C4F82" text-anchor="middle">WI</text>
  <!-- Top arc text: WHITNEY OPS -->
  <path id="topArc" d="M 22,100 A 78,78 0 0,1 178,100" fill="none"/>
  <text font-family="Arial,sans-serif" font-size="11" fill="#9B8EC4" letter-spacing="4">
    <textPath href="#topArc" startOffset="8%">WHITNEY OPS</textPath>
  </text>
  <!-- Bottom arc text: OPERATIONS & GROWTH -->
  <path id="botArc" d="M 25,108 A 78,78 0 0,0 175,108" fill="none"/>
  <text font-family="Arial,sans-serif" font-size="9" fill="#C8BFDF" letter-spacing="3">
    <textPath href="#botArc" startOffset="5%">OPERATIONS · GROWTH</textPath>
  </text>
  <!-- Small decorative dots at 9 and 3 o'clock -->
  <circle cx="6" cy="100" r="3" fill="#9B8EC4" opacity="0.4"/>
  <circle cx="194" cy="100" r="3" fill="#9B8EC4" opacity="0.4"/>
</svg>
